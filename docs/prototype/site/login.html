<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMDB - 로그인</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #001529 0%, #003a70 50%, #0050a0 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }

.login-container { width: 420px; }

.login-header { text-align: center; margin-bottom: 32px; }
.login-header .logo-icon { font-size: 48px; margin-bottom: 12px; }
.login-header h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.login-header p { color: rgba(255,255,255,0.6); font-size: 14px; }

.login-card { background: #fff; border-radius: 12px; padding: 36px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

.login-tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #f0f0f0; }
.login-tab { flex: 1; text-align: center; padding: 10px 0; cursor: pointer; font-size: 14px; color: #8c8c8c; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.login-tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }
.login-tab:hover { color: #1890ff; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.form-group input { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; outline: none; }
.form-group input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
.form-group input::placeholder { color: #bfbfbf; }

.form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 13px; }
.form-options label { display: flex; align-items: center; gap: 6px; color: #666; cursor: pointer; }
.form-options a { color: #1890ff; text-decoration: none; }

.login-btn { width: 100%; padding: 12px; background: #1890ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.login-btn:hover { background: #40a9ff; }

.divider { display: flex; align-items: center; margin: 20px 0; color: #d9d9d9; font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #f0f0f0; }
.divider span { padding: 0 12px; color: #8c8c8c; }

.ldap-btn { width: 100%; padding: 10px; background: #f5f5f5; color: #333; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.ldap-btn:hover { background: #e6e6e6; border-color: #bfbfbf; }

/* LDAP Tab */
.tab-content { display: none; }
.tab-content.active { display: block; }

.ldap-info { background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #333; display: flex; align-items: flex-start; gap: 8px; }
.ldap-info .icon { flex-shrink: 0; }

.login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo-icon">🔧</div>
    <h1>CMDB</h1>
    <p>Configuration Management Database</p>
  </div>
  
  <div class="login-card">
    <div class="login-tabs">
      <div class="login-tab active" onclick="switchTab('local')">로컬 계정</div>
      <div class="login-tab" onclick="switchTab('ldap')">LDAP / AD</div>
    </div>
    
    <!-- Local Login -->
    <div id="tab-local" class="tab-content active">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" placeholder="사용자 아이디 입력" value="admin">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" placeholder="비밀번호 입력" value="••••••••">
      </div>
      <div class="form-options">
        <label><input type="checkbox" checked> 로그인 상태 유지</label>
        <a href="#">비밀번호 찾기</a>
      </div>
      <button class="login-btn">로그인</button>
    </div>
    
    <!-- LDAP Login -->
    <div id="tab-ldap" class="tab-content">
      <div class="ldap-info">
        <span class="icon">ℹ️</span>
        <div>회사 LDAP/Active Directory 계정으로 로그인합니다.<br>최초 로그인 시 자동으로 계정이 생성됩니다.</div>
      </div>
      <div class="form-group">
        <label>LDAP 서버</label>
        <select style="width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;background:#fff">
          <option>ldap.company.com (기본)</option>
          <option>ad.company.com (AD)</option>
        </select>
      </div>
      <div class="form-group">
        <label>아이디 (사번 또는 이메일)</label>
        <input type="text" placeholder="hong@company.com 또는 E12345">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" placeholder="LDAP 비밀번호 입력">
      </div>
      <button class="login-btn">LDAP 로그인</button>
    </div>
  </div>
  
  <div class="login-footer">
    © 2026 CMDB v1.0 · Powered by Your Company
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  
  if (tab === 'local') {
    document.querySelectorAll('.login-tab')[0].classList.add('active');
    document.getElementById('tab-local').classList.add('active');
  } else {
    document.querySelectorAll('.login-tab')[1].classList.add('active');
    document.getElementById('tab-ldap').classList.add('active');
  }
}
</script>
</body>
</html>
